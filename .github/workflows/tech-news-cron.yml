name: Tech News Aggregator Cron

on:
  schedule:
    # Run every 2 hours on the hour
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Allow manual triggering from the Actions tab in GitHub UI

jobs:
  scrape-and-update:
    name: Scrape & Update Database
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Aggregator Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Execute News Scraper CLI
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ENVIRONMENT: production
        run: |
          python backend/app/scrape_cli.py
